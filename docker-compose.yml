version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: oa-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: abc&123
      MYSQL_DATABASE: guigu-oa
      MYSQL_USER: oa_user
      MYSQL_PASSWORD: oa_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - oa-network

  # Redis缓存
  redis:
    image: redis:6.2-alpine
    container_name: oa-redis
    restart: unless-stopped
    command: redis-server --requirepass 123456
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - oa-network

  # OA应用
  oa-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oa-app
    restart: unless-stopped
    ports:
      - "8800:8800"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/guigu-oa?serverTimezone=GMT%2B8&useSSL=false&characterEncoding=utf-8
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=abc&123
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_REDIS_PASSWORD=123456
    depends_on:
      - mysql
      - redis
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - oa-network

  # Nginx反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: oa-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - oa-app
    networks:
      - oa-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  oa-network:
    driver: bridge 